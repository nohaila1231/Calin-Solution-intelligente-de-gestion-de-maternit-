# ============================================
# Project information
# ============================================
sonar.projectKey=prj-next
sonar.projectName=prj-next
sonar.projectVersion=1.0

# ============================================
# Source code
# ============================================
sonar.sources=src

# ============================================
# Tests
# ============================================
sonar.tests=src
sonar.test.inclusions=src/**/*.test.tsx

# ============================================
# Coverage report generated by Vitest
# ============================================
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ============================================
# Source exclusions
# ============================================
sonar.exclusions=\
src/main.tsx,\
src/vite-env.d.ts,\
src/**/*.test.tsx,\
src/**/*.spec.tsx

# ============================================
# Encoding
# ============================================
sonar.sourceEncoding=UTF-8

# ============================================
# Ignore sandbox issues (Community Edition)
# ============================================
sonar.issues.in.sandbox.skip=true
sonar.newCode.issues.in.sandbox.skip=true