name: SonarQube Analysis

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Clean install and setup
        run: |
          # Nettoyer les éventuels fichiers problématiques
          rm -f package-lock.json
          rm -rf node_modules
          
          # Installer les dépendances
          npm install --legacy-peer-deps
          
          # Installer les outils de test
          npm install -D vitest@^1.0.0 @vitest/coverage-v8@^1.0.0 jsdom@^23.0.0 @testing-library/react @testing-library/jest-dom --legacy-peer-deps

      - name: Configure package.json
        run: |
          # Ajouter les scripts manquants
          npm pkg set scripts.test="vitest"
          npm pkg set scripts.coverage="vitest run --coverage --reporter=json --reporter=html"
          
          # Ajouter la configuration vitest
          cat > vitest.config.ts << 'EOF'
          import { defineConfig } from 'vitest/config'
          import react from '@vitejs/plugin-react-swc'

          export default defineConfig({
            plugins: [react()],
            test: {
              globals: true,
              environment: 'jsdom',
              setupFiles: './src/test/setup.ts',
              coverage: {
                reporter: ['text', 'json', 'html', 'lcov'],
                exclude: ['node_modules/', 'src/test/'],
                all: true,
                include: ['src/**/*.{ts,tsx}'],
              },
            },
          })
          EOF

      - name: Create test setup
        run: |
          mkdir -p src/test
          cat > src/test/setup.ts << 'EOF'
          import '@testing-library/jest-dom'
          EOF

      - name: Create minimal test
        run: |
          mkdir -p src/__tests__
          cat > src/__tests__/App.test.tsx << 'EOF'
          import { describe, it, expect } from 'vitest'
          
          describe('App', () => {
            it('should work', () => {
              expect(true).toBe(true)
            })
          })
          EOF

      - name: Run tests with coverage (using npx)
        run: npx vitest run --coverage

      - name: List coverage files (debug)
        if: always()
        run: |
          ls -la coverage/ || echo "No coverage directory"
          find . -name "lcov.info" || echo "No lcov.info found"

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-cache
          restore-keys: |
            ${{ runner.os }}-sonar-cache

      # Analyse des branches
      - name: SonarQube Scan (Branch)
        if: github.event_name == 'push'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_OPTS: -Dsonar.scanner.skipJreProvisioning=true
        with:
          args: >
            -Dsonar.branch.name=${{ github.ref_name }}

      # Analyse des Pull Requests
      - name: SonarQube Scan (Pull Request)
        if: github.event_name == 'pull_request'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_OPTS: -Dsonar.scanner.skipJreProvisioning=true
        with:
          args: >
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.head_ref }}
            -Dsonar.pullrequest.base=${{ github.base_ref }}