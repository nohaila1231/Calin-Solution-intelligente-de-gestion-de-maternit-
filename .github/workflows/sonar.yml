name: SonarQube Analysis

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-cache
          restore-keys: |
            ${{ runner.os }}-sonar-cache

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_OPTS: -Dsonar.scanner.skipJreProvisioning=true
        with:
          args: >
            -Dsonar.projectKey=prj-next
            -Dsonar.projectName=prj-next
            -Dsonar.sources=src
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.scanner.downloadPlugins=false

      # === AJOUT : Commentaire dans la PR ===
      - name: Add SonarQube Comment to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            // Récupérer l'URL du projet SonarQube
            const sonarUrl = 'http://35.187.88.163:9000';
            const projectKey = 'prj-next';
            const branch = pr.head.ref;
            
            // Construire le message
            const message = `
            ## 🔍 Analyse SonarQube terminée !
            
            📊 **Projet** : ${projectKey}
            🌿 **Branche** : ${branch}
            📅 **Statut** : ✅ Analyse réussie
            
            🔗 **Voir les résultats** : [${sonarUrl}/dashboard?id=${projectKey}&branch=${branch}](${sonarUrl}/dashboard?id=${projectKey}&branch=${branch})
            
            > ℹ️ Les résultats détaillés sont disponibles sur SonarQube
            `;
            
            // Créer le commentaire
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });